<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday Alanna</title>

<style>

body{
    margin:0;
    font-family: Arial;
    background:#fdf6ee;
    text-align:center;
    overflow:hidden;
}

/* LOCK SCREEN */
#locked{
    padding:50px;
}

/* MESSAGE */
#message{
    display:none;
    padding:40px;
    max-width:700px;
    margin:auto;
    background:white;
    border-radius:15px;
}

/* INPUT */
input{
    padding:10px;
    font-size:16px;
    margin-top:10px;
}

button{
    padding:10px 20px;
    margin-top:10px;
    cursor:pointer;
}

/* CONFETTI */
.confetti{
    position:fixed;
    top:-10px;
    width:10px;
    height:10px;
    background:red;
    animation:fall 3s linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(100vh) rotate(360deg);
        opacity:0;
    }
}

</style>
</head>

<body>

<!-- LOCK SCREEN -->
<div id="locked">

<h1>🐙 Birthday Message Incoming</h1>

<p>
Yes, I made a whole webpage for your birthday.<br>
No, I will not be taking questions.
</p>

<p><b>Enter secret password:</b></p>

<input type="password" id="password">

<br>

<button onclick="unlock()">Unlock</button>

<p id="wrong"></p>

</div>

<!-- MESSAGE -->
<div id="message">

<h1>Happy Birthday Alanna 🎂</h1>

<p id="letter">

(Here goes your letter 💛)

</p>

<br><br>

<!-- MUSIC -->
<button onclick="playMusic()">
▶ Play True Friend
</button>

<br><br>

<iframe
id="music"
width="0"
height="0"
src="https://www.youtube.com/embed/3tGJ4ZlZ7u0?enablejsapi=1"
frameborder="0"
allow="autoplay">
</iframe>

</div>

<script>

/* PASSWORD */
function unlock(){

const pass =
document.getElementById("password").value;

if(pass === "octopus"){

document.getElementById("locked").style.display="none";
document.getElementById("message").style.display="block";

startConfetti();
typeLetter();

}else{

document.getElementById("wrong").innerText =
"Nice try 😌";

}

}

/* CONFETTI */
function startConfetti(){

for(let i=0;i<80;i++){

let c = document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.backgroundColor=
["#ff6b6b","#feca57","#48dbfb","#1dd1a1"][Math.floor(Math.random()*4)];

c.style.animationDuration=(2+Math.random()*3)+"s";

document.body.appendChild(c);

setTimeout(()=>c.remove(),5000);

}

}

/* TYPE LETTER */
function typeLetter(){

let text =
`Hi Alanna,

Happy Birthday!!

(This is where your real letter goes 💛)`;

let i=0;

let speed = 30;

function typing(){

if(i < text.length){

document.getElementById("letter").innerHTML += text.charAt(i);
i++;
setTimeout(typing,speed);
}

}

document.getElementById("letter").innerHTML="";
typing();

}

/* MUSIC */
function playMusic(){

let iframe = document.getElementById("music");
iframe.src += "&autoplay=1";

}

</script>

</body>
</html>
