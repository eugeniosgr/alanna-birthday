<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday Alanna</title>

<style>

body{
    margin:0;
    font-family: Arial;
    background:#fdf6ee;
    text-align:center;
    overflow:hidden;
}

/* SCREENS */
.screen{
    display:none;
    padding:40px;
}

.active{
    display:block;
}

/* LOCK */
#locked{
    padding:50px;
}

input{
    padding:10px;
    font-size:16px;
    margin-top:10px;
}

button{
    padding:10px 20px;
    margin-top:15px;
    cursor:pointer;
    border:none;
    border-radius:10px;
    background:#333;
    color:white;
}

/* ENVELOPE */
#envelope{
    font-size:80px;
    margin-top:40px;
    cursor:pointer;
    transition:transform 0.3s;
}

#envelope:hover{
    transform:scale(1.1);
}

/* LETTER */
#letterBox{
    display:none;
    background:white;
    padding:30px;
    max-width:600px;
    margin:30px auto;
    border-radius:15px;
    animation:pop 0.6s ease;
}

@keyframes pop{
    from{transform:scale(0.7);opacity:0;}
    to{transform:scale(1);opacity:1;}
}

/* CONFETTI */
.confetti{
    position:fixed;
    top:-10px;
    width:10px;
    height:10px;
    animation:fall linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(100vh) rotate(360deg);
        opacity:0;
    }
}

</style>
</head>

<body>

<!-- LOCK SCREEN -->
<div id="locked" class="screen active">

<h1>🐙 Birthday Message Incoming</h1>

<p>
Yes, I made a whole webpage for your birthday.<br>
No, I will not be taking questions.
</p>

<input type="password" id="password" placeholder="secret password">

<br>

<button onclick="unlock()">Unlock</button>

<p id="wrong"></p>

</div>

<!-- PAGE 1 -->
<div id="page1" class="screen">

<h2>Hi Alanna 💛</h2>

<p>
I hope this next year brings you peace, good books,<br>
good people, and more soft happy moments.
</p>

<button onclick="nextPage()">
Next page ➜
</button>

</div>

<!-- PAGE 2: ENVELOPE -->
<div id="page2" class="screen">

<h2>One more thing...</h2>

<div id="envelope" onclick="openEnvelope()">
💌
</div>

<p>Click the envelope</p>

</div>

<!-- LETTER -->
<div id="page3" class="screen">

<div id="letterBox">

<h2>Happy Birthday Alanna 🎂</h2>

<p id="letter"></p>

</div>

</div>

<script>

const letterText = `Hi Alanna,

Happy Birthday!!

I made this little website for you because I thought it would be fun (and it was).

Hope this next year is full of calm days, good books, and things that make you feel like yourself again.

– Eugenio 💛`;

function showScreen(id){
document.querySelectorAll(".screen")
.forEach(s => s.classList.remove("active"));

document.getElementById(id).classList.add("active");
}

/* UNLOCK */
function unlock(){

const pass = document.getElementById("password").value;

if(pass === "octopus"){
showScreen("page1");
startConfetti();
}else{
document.getElementById("wrong").innerText="Nice try 😌";
}

}

/* NEXT PAGE */
function nextPage(){
showScreen("page2");
}

/* OPEN ENVELOPE */
function openEnvelope(){
showScreen("page3");
document.getElementById("letterBox").style.display="block";
typeLetter();
startConfetti();
}

/* TYPE LETTER */
function typeLetter(){

let i=0;
document.getElementById("letter").innerHTML="";

function typing(){
if(i < letterText.length){
document.getElementById("letter").innerHTML += letterText.charAt(i);
i++;
setTimeout(typing,25);
}
}

typing();
}

/* CONFETTI */
function startConfetti(){

for(let i=0;i<80;i++){

let c = document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.backgroundColor=
["#ff6b6b","#feca57","#48dbfb","#1dd1a1"][Math.floor(Math.random()*4)];
c.style.animationDuration=(2+Math.random()*3)+"s";

document.body.appendChild(c);

setTimeout(()=>c.remove(),5000);
}

}

</script>

</body>
</html>
