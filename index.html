<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday Alanna</title>

<style>

body{
    margin:0;
    font-family: Arial;
    background:#fdf6ee;
    text-align:center;
    overflow:hidden;
}

/* SCREENS */
.screen{
    display:none;
    padding:40px;
}
.active{
    display:block;
}

/* INPUT */
input{
    padding:10px;
    font-size:16px;
    margin-top:10px;
}

button{
    padding:10px 20px;
    margin-top:15px;
    cursor:pointer;
    border:none;
    border-radius:10px;
    background:#333;
    color:white;
}

/* ENVELOPE */
#envelope{
    font-size:90px;
    cursor:pointer;
    transition:transform 0.3s;
}

#envelope:hover{
    transform:scale(1.1);
}

/* LETTER */
#letterBox{
    display:none;
    background:white;
    padding:30px;
    max-width:600px;
    margin:30px auto;
    border-radius:15px;
    position:relative;
    z-index:2;
}

/* CONFETTI */
.confetti{
    position:fixed;
    top:-10px;
    width:10px;
    height:10px;
    animation:fall linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(100vh) rotate(360deg);
        opacity:0;
    }
}

/* PHOTO BACKGROUND */
#photo-bg{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    overflow:hidden;
    z-index:0;
}

.photo{
    position:absolute;
    width:120px;
    height:120px;
    object-fit:cover;
    border-radius:12px;
    opacity:0;
    animation:floatPhoto linear forwards, fadePhoto ease-in-out forwards;
}

@keyframes floatPhoto{
    from{transform:translateY(100vh);}
    to{transform:translateY(-200px);}
}

@keyframes fadePhoto{
    0%{opacity:0;}
    15%{opacity:0.35;}
    85%{opacity:0.35;}
    100%{opacity:0;}
}

</style>
</head>

<body>

<!-- BACKGROUND PHOTOS -->
<div id="photo-bg"></div>

<!-- SOUND -->
<audio id="openSound" src="https://www.soundjay.com/misc/sounds/page-flip-4.mp3"></audio>

<!-- LOCK -->
<div id="locked" class="screen active">

<h1>🐙 Birthday Message Incoming 🐙</h1>

<p>Enter secret password:</p>

<input type="password" id="password">

<br>

<button onclick="unlock()">Unlock</button>

<p id="wrong"></p>

</div>

<!-- PAGE 1 -->
<div id="page1" class="screen">

<h2>Hello!! 💛</h2>

<p>
Yes, I made a webpage to celebrate your birthday. 👨🏻‍💻,<br>
No, I won't discuss how much time it took. 🤣
</p>

<button onclick="next1()">Next ➜</button>

</div>

<!-- PAGE 2 MUSIC -->
<div id="page2" class="screen">

<h2>Before we continue...</h2>

<p>Play the soundtrack 🎵</p>

<button onclick="playMusic()">▶ Play</button>

<br><br>

<button onclick="next2()" id="next2btn" style="display:none;">
Next ➜
</button>

</div>

<!-- PAGE 3 ENVELOPE -->
<div id="page3" class="screen">

<h2>One more thing...</h2>

<div id="envelope" onclick="openEnvelope()">💌</div>

<p>Click the envelope</p>

</div>

<!-- LETTER -->
<div id="page4" class="screen">

<div id="letterBox">

<h2>Happy Birthday Alanna 🎂</h2>

<p id="letter"></p>

</div>

</div>

<script>

const letterText = `Happy Birthday!!
Hice esta página porque sentí que estaría lindooo JIJI sé que technically ya te felicité en tu cumpleee pero una vez más no está de más.
Trataré de no hacerlo muy largo jajaja pero Alanna una vez más felizzzz cumpleeee!!
Muchas gracias por la compañía que me brindas todos los días y por siempre escogerme como tu amigo, I couldn't be more honored.
Sé que no nos es posible hablar o vernos todos los días como antes, pero siempre te tengo presente y deseo que siempre estés llena de salud, amor, trabajo, abundancia, dinero!!, pero más que nada felicidad.

También te hice llegar unos regalitos, no es gran cosa pero es TRABAJO MUY HONESTO jajaja.
Primero, el libro de Remarkably Bright Creatures, porque vi que hace poco loggeaste la peli en letterboxd así que pensé: démosle más de esto jajaja. Espero que el libro lives up to the expectations y que incluso sea mejor que la peli.

La mascarilla es para que limpies las impurezas... de la piel, porque de la vida no se puede (aún).

Los sprays de relajación y sueño son para cuando tu cerebro esté reviviendo conversaciones incómodas a las 3 am y no te dejen dormir, que te ayuden a encontrar paz y serenidad en esos días. O tal vez cuando solo necesites slow things down y tomar un respiro.

Y la vela de cumpleaños... originalmente iba a decir algo profundo como que "es para que tu camino siempre esté iluminado" pero la verdad sonaba muy cheesy jajaja más bien quisiera que fuera un reminder for you to celebrate a little extra this year porque los cumpleaños merecen velas, no matter how old we get.

Más que nada, quería regalarte algo que te hiciera feliz, te ayudara a relajarte y hopefully to make your day a little brighter.

Espero que esta próxima vuelta alrededor del Sol te traiga felicidad, recuerdos increíbles, buenos libros, nuevas aventuras, y muchos más días buenos que malos.

I love you sooooooooooooo much I hope we stay friends forever!!

– Eugenio 💛`;

/* NAV */
function show(id){
document.querySelectorAll(".screen")
.forEach(s => s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* LOCK */
function unlock(){
const pass = document.getElementById("password").value;

if(pass === "octopus"){
show("page1");
startConfetti();
}else{
document.getElementById("wrong").innerText="Nice try 😌";
}
}

/* PAGE FLOW */
function next1(){ show("page2"); }

function playMusic(){
window.open(
"https://www.youtube.com/watch?v=gfiJnbbhC2c&list=RDgfiJnbbhC2c&start_radio=1",
"_blank"
);
document.getElementById("next2btn").style.display="inline-block";
}

function next2(){ show("page3"); }

/* ENVELOPE */
function openEnvelope(){

document.getElementById("openSound").play();

show("page4");

document.getElementById("letterBox").style.display="block";

typeLetter();

startConfetti();

startPhotos();

}

/* LETTER BY LINES */
function typeLetter(){

const lines = letterText.split("\n");
let i = 0;

document.getElementById("letter").innerHTML="";

function showLine(){

if(i < lines.length){

let line = document.createElement("div");
line.innerText = lines[i];
line.style.opacity = 0;
line.style.transform = "translateY(10px)";
line.style.transition = "all 0.6s ease";

document.getElementById("letter").appendChild(line);

setTimeout(()=>{
line.style.opacity = 1;
line.style.transform = "translateY(0)";
},50);

i++;
setTimeout(showLine,500);

}

}

showLine();
}

/* CONFETTI */
function startConfetti(){

for(let i=0;i<80;i++){

let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.backgroundColor=
["#ff6b6b","#feca57","#48dbfb","#1dd1a1"][Math.floor(Math.random()*4)];
c.style.animationDuration=(2+Math.random()*3)+"s";

document.body.appendChild(c);

setTimeout(()=>c.remove(),5000);
}

}

/* PHOTOS LOOP */
let photoInterval;

function startPhotos(){

const images = [
"https://raw.githubusercontent.com/eugeniosgr/alanna-birthday/refs/heads/main/IMG_8690.heic",
"https://raw.githubusercontent.com/eugeniosgr/alanna-birthday/refs/heads/main/IMG_8298.HEIC",
"https://raw.githubusercontent.com/eugeniosgr/alanna-birthday/refs/heads/main/IMG_6465.HEIC",
"https://raw.githubusercontent.com/eugeniosgr/alanna-birthday/refs/heads/main/IMG_3084.HEIC",
"https://raw.githubusercontent.com/eugeniosgr/alanna-birthday/refs/heads/main/IMG_2965.HEIC",
"https://raw.githubusercontent.com/eugeniosgr/alanna-birthday/refs/heads/main/IMG_2782.heic",
"https://raw.githubusercontent.com/eugeniosgr/alanna-birthday/refs/heads/main/IMG_2048.HEIC",
"https://raw.githubusercontent.com/eugeniosgr/alanna-birthday/refs/heads/main/IMG_1003.HEIC",
"https://raw.githubusercontent.com/eugeniosgr/alanna-birthday/refs/heads/main/IMG_0887.HEIC",
"https://raw.githubusercontent.com/eugeniosgr/alanna-birthday/refs/heads/main/IMG_0736.HEIC",
"https://raw.githubusercontent.com/eugeniosgr/alanna-birthday/refs/heads/main/IMG_0673.HEIC",
"https://raw.githubusercontent.com/eugeniosgr/alanna-birthday/refs/heads/main/IMG_0616.HEIC",
"https://raw.githubusercontent.com/eugeniosgr/alanna-birthday/refs/heads/main/IMG_0501.HEIC",
"https://raw.githubusercontent.com/eugeniosgr/alanna-birthday/refs/heads/main/IMG_0427.HEIC",
"https://raw.githubusercontent.com/eugeniosgr/alanna-birthday/refs/heads/main/IMG_0378.HEIC",
"https://raw.githubusercontent.com/eugeniosgr/alanna-birthday/refs/heads/main/IMG_0238.HEIC",
"https://github.com/eugeniosgr/alanna-birthday/blob/main/F2376D7E-2931-4C1E-96FD-731A82BA5999.jpg?raw=true",
"https://github.com/eugeniosgr/alanna-birthday/blob/main/970C25C8-DCFA-46A1-B2D0-EF8839B934DF.JPG?raw=true",
"https://github.com/eugeniosgr/alanna-birthday/blob/main/4EE5C4EF-737A-4A17-809A-6AFF652AB5EE.JPG?raw=true",
"https://github.com/eugeniosgr/alanna-birthday/blob/main/05AF6310-5A97-444A-A0B9-A5CD0D4AD965.JPG?raw=true"
];

photoInterval = setInterval(()=>{

let img=document.createElement("img");
img.className="photo";
img.src=images[Math.floor(Math.random()*images.length)];

img.style.left=Math.random()*100+"vw";
img.style.animationDuration=(10+Math.random()*10)+"s";

document.getElementById("photo-bg").appendChild(img);

setTimeout(()=>img.remove(),20000);

},1200);

}

</script>

</body>
</html>
