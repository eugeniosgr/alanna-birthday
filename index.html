<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday Message</title>

<style>

body{
    margin:0;
    font-family: Arial;
    background:#fdf6ee;
    text-align:center;
    overflow:hidden;
}

.container{
    padding:50px;
}

h1{
    margin-top:40px;
}

#message{
    display:none;
    background:white;
    padding:25px;
    margin:30px auto;
    width:80%;
    max-width:600px;
    border-radius:15px;
}

input{
    padding:10px;
    font-size:16px;
}

button{
    padding:10px 20px;
    margin-top:10px;
    cursor:pointer;
}

/* ✨ STARS */
#stars{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    pointer-events:none;
    overflow:hidden;
}

.star{
    position:absolute;
    font-size:18px;
    animation:fall linear forwards;
}

@keyframes fall{
    from{
        transform:translateY(-50px);
        opacity:1;
    }
    to{
        transform:translateY(100vh);
        opacity:0;
    }
}

</style>
</head>

<body>

<div id="stars"></div>

<div class="container">

<!-- LOCK SCREEN -->
<div id="locked">

<h1>🐙 Birthday Message Incoming</h1>

<p>
Hi Alanna,<br><br>

Yes, I made an entire website for your birthday.<br>
No, I don't want to talk about how much time this took. 😌
</p>

<p><b>Enter secret password:</b></p>

<input type="password" id="password">

<br>

<button onclick="unlock()">Unlock</button>

<p id="wrong"></p>

</div>

<!-- MESSAGE -->
<div id="message">

<h1>Happy Birthday Alanna 🎂</h1>

<p>
(This is where your letter goes 💛)
</p>

</div>

</div>

<script>

// 🔓 PASSWORD
function unlock(){

const pass =
document.getElementById("password").value;

if(pass === "octopus"){

document.getElementById("locked").style.display="none";
document.getElementById("message").style.display="block";

startStars();

}else{

document.getElementById("wrong").innerText =
"Nice try 😌";

}

}

// ✨ STARS
function createStar(){

const star = document.createElement("div");
star.className="star";
star.innerHTML="✨";

star.style.left = Math.random()*100 + "vw";
star.style.animationDuration =
(3 + Math.random()*3) + "s";

document.getElementById("stars").appendChild(star);

setTimeout(()=>star.remove(),7000);
}

function startStars(){
setInterval(createStar,300);
}

</script>

</body>
</html>
