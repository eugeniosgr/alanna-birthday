<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday Alanna</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#fdf6ee;
    text-align:center;
    padding:50px;
}

.container{
    max-width:700px;
    margin:auto;
}

h1{
    color:#444;
}

#message{
    display:none;
    margin-top:30px;
    background:white;
    padding:25px;
    border-radius:15px;
}

button{
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>🐙 Birthday Message Incoming 🐙</h1>

<p>
This page is locked until your birthday.
</p>

<h2 id="countdown"></h2>

<button id="openBtn" style="display:none;">
Open your birthday message 💛
</button>

<div id="message">

<h2>Happy Birthday Alanna!</h2>

<p>
Your birthday letter will go here.
</p>

</div>

</div>

<script>

const unlockDate =
new Date("2026-06-25T00:00:00");

const countdown =
document.getElementById("countdown");

const button =
document.getElementById("openBtn");

const message =
document.getElementById("message");

function updateCountdown(){

const now = new Date();
const diff = unlockDate - now;

if(diff <= 0){

countdown.innerHTML =
"🎉 It's your birthday!";

button.style.display = "inline-block";

return;
}

const days =
Math.floor(diff/(1000*60*60*24));

countdown.innerHTML =
days + " days remaining";
}

button.onclick = () =>{
message.style.display="block";
button.style.display="none";
}

setInterval(updateCountdown,1000);

updateCountdown();

</script>

</body>
</html>
