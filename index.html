<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday Alanna</title>

<style>

body{
    margin:0;
    font-family: Arial;
    background:#fdf6ee;
    text-align:center;
    overflow:hidden;
}

/* SCREENS */
.screen{
    display:none;
    padding:40px;
}
.active{
    display:block;
}

/* INPUT */
input{
    padding:10px;
    font-size:16px;
    margin-top:10px;
}

button{
    padding:10px 20px;
    margin-top:15px;
    cursor:pointer;
    border:none;
    border-radius:10px;
    background:#333;
    color:white;
}

/* ENVELOPE */
#envelope{
    font-size:90px;
    cursor:pointer;
    transition:transform 0.3s;
}

#envelope:hover{
    transform:scale(1.1);
}

/* LETTER */
#letterBox{
    display:none;
    background:white;
    padding:30px;
    max-width:600px;
    margin:30px auto;
    border-radius:15px;
    position:relative;
    z-index:2;
    animation:pop 0.6s ease;
}

@keyframes pop{
    from{transform:scale(0.7);opacity:0;}
    to{transform:scale(1);opacity:1;}
}

/* CONFETTI */
.confetti{
    position:fixed;
    top:-10px;
    width:10px;
    height:10px;
    animation:fall linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(100vh) rotate(360deg);
        opacity:0;
    }
}

/* PHOTO BACKGROUND */
#photo-bg{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    overflow:hidden;
    z-index:0;
}

.photo{
    position:absolute;
    width:120px;
    height:120px;
    object-fit:cover;
    border-radius:12px;
    opacity:0;
    animation:floatPhoto linear forwards, fadePhoto ease-in-out forwards;
}

@keyframes floatPhoto{
    from{
        transform:translateY(100vh);
    }
    to{
        transform:translateY(-200px);
    }
}

@keyframes fadePhoto{
    0%{opacity:0;}
    15%{opacity:0.35;}
    85%{opacity:0.35;}
    100%{opacity:0;}
}

</style>
</head>

<body>

<!-- BACKGROUND PHOTOS -->
<div id="photo-bg"></div>

<!-- LOCK -->
<div id="locked" class="screen active">

<h1>🐙 Birthday Message Incoming</h1>

<p>Enter secret password:</p>

<input type="password" id="password">

<br>

<button onclick="unlock()">Unlock</button>

<p id="wrong"></p>

</div>

<!-- PAGE 1 -->
<div id="page1" class="screen">

<h2>Hi Alanna 💛</h2>

<p>
I hope this next year brings you peace,<br>
good books and soft happy moments.
</p>

<button onclick="next1()">Next ➜</button>

</div>

<!-- PAGE 2 MUSIC -->
<div id="page2" class="screen">

<h2>Before we continue...</h2>

<p>Play the soundtrack 🎵</p>

<button onclick="playMusic()">▶ Play True Friend</button>

<br><br>

<button onclick="next2()" id="next2btn" style="display:none;">
Next ➜
</button>

</div>

<!-- PAGE 3 ENVELOPE -->
<div id="page3" class="screen">

<h2>One more thing...</h2>

<div id="envelope" onclick="openEnvelope()">💌</div>

<p>Click the envelope</p>

</div>

<!-- LETTER -->
<div id="page4" class="screen">

<div id="letterBox">

<h2>Happy Birthday Alanna 🎂</h2>

<p id="letter"></p>

</div>

</div>

<script>

const letterText = `Hi Alanna,

Happy Birthday!!

I made this little website for you because I thought it would be fun.

Hope this year brings you calm, love, and good books.

– Eugenio 💛`;

/* NAVIGATION */
function show(id){
document.querySelectorAll(".screen")
.forEach(s => s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* LOCK */
function unlock(){

const pass = document.getElementById("password").value;

if(pass === "octopus"){
show("page1");
startConfetti();
}else{
document.getElementById("wrong").innerText="Nice try 😌";
}

}

/* PAGE 1 */
function next1(){
show("page2");
}

/* MUSIC */
function playMusic(){

window.open(
"https://www.youtube.com/watch?v=gfiJnbbhC2c&list=RDgfiJnbbhC2c&start_radio=1",
"_blank"
);

document.getElementById("next2btn").style.display="inline-block";
}

/* PAGE 2 */
function next2(){
show("page3");
}

/* ENVELOPE */
function openEnvelope(){

show("page4");

document.getElementById("letterBox").style.display="block";

typeLetter();

startConfetti();

startPhotos();

}

/* TYPE LETTER */
function typeLetter(){

let i=0;
document.getElementById("letter").innerHTML="";

function typing(){
if(i < letterText.length){
document.getElementById("letter").innerHTML += letterText.charAt(i);
i++;
setTimeout(typing,25);
}
}

typing();
}

/* CONFETTI */
function startConfetti(){

for(let i=0;i<80;i++){

let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.backgroundColor=
["#ff6b6b","#feca57","#48dbfb","#1dd1a1"][Math.floor(Math.random()*4)];
c.style.animationDuration=(2+Math.random()*3)+"s";

document.body.appendChild(c);

setTimeout(()=>c.remove(),5000);
}

}

/* PHOTOS */
function startPhotos(){

const images = [
"https://images.unsplash.com/photo-1520975928316-4d3c6c1d3d8b",
"https://images.unsplash.com/photo-1520975682031-a1d1c1d6d3c1",
"https://images.unsplash.com/photo-1520975910011-3a3c3c3c3c3c",
"https://images.unsplash.com/photo-1520975920000-1a1a1a1a1a1a"
];

for(let i=0;i<8;i++){

let img=document.createElement("img");
img.className="photo";
img.src=images[Math.floor(Math.random()*images.length)];

img.style.left=Math.random()*100+"vw";
img.style.animationDuration=(10+Math.random()*10)+"s";
img.style.animationDelay=(Math.random()*5)+"s";

document.getElementById("photo-bg").appendChild(img);

}

}

</script>

</body>
</html>
